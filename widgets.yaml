- name: google searchbar
  size:
    w: 4
    h: 1
  html: |
    <form action="https://www.google.com/search" method="get" target="_blank" style="margin:0 auto; width:100%; border-radius:30px; border:1px solid #dcdcdc;">
      <input type="text" name="q" placeholder="Search Google" style="width: 90%; height: 90%; border:none; font-size:16px; outline: none;">
    </form>
  
- name: links
  size:
    w: 1
    h: 3
  configuration:
    icon: string
    url: string
    name: string
- name: weather
  size:
    w: 2
    h: 1
  configuration:
    location: string
    units: string
    api_key: string
- name: rss
  size:
    w: 1
    h: 5
  configuration:
    url: string
    name: string
- name: clock
  size:
    w: 1
    h: 1
  configuration:
    timezone: string
    format: string
- name: github
  size:
    w: 3
    h: 1
  configuration:
    username: string
    name: string
    token: string
- name: bookmark
  size:
    w: 1
    h: 3
  configuration:
    search: string
    tag: string